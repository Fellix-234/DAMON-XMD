services:
  - name: damon-xmd
    type: web
    env: docker
    region: fra

    instance_type: free

    docker:
      dockerfile: ./Dockerfile

    ports:
      - port: 3000
        protocol: http

    routes:
      - path: /
        port: 3000

    restartPolicy:
      type: always

    healthCheck:
      http:
        path: /ping
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
